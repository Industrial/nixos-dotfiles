name: 'Check'
description: 'Run nix flake check and build dry-run for a host'
inputs:
  host:
    description: 'Host name to check'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Nix Flake Check and build dry-run
      shell: bash
      env:
        HOST: ${{ inputs.host }}
      run: |
        set -euo pipefail
        case "$HOST" in
          drakkar|huginn|mimir) ;;
          *)
            echo "Invalid host: $HOST" >&2
            exit 1
            ;;
        esac
        cd "hosts/$HOST"
        nix flake check
        nix build --dry-run ".#nixosConfigurations.$HOST.config.system.build.toplevel"
