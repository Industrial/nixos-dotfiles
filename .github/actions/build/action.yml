name: 'Build'
description: 'Build NixOS configuration for a host'
inputs:
  host:
    description: 'Host name to build'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Build NixOS Configuration
      shell: bash
      env:
        HOST: ${{ inputs.host }}
      run: |
        set -euo pipefail
        case "$HOST" in
          drakkar|huginn|mimir) ;;
          *)
            echo "Invalid host: $HOST" >&2
            exit 1
            ;;
        esac
        cd "hosts/$HOST"
        nix build ".#nixosConfigurations.$HOST.config.system.build.toplevel"
